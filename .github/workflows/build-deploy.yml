name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # Gate qualité AVANT le déploiement : `npm run build` = `vite build` seul
      # (esbuild ignore les types), donc sans ce garde-fou une erreur de type
      # partirait en prod. Le type-check est bloquant ; si tsc échoue, l'étape
      # de déploiement FTP ci-dessous ne s'exécute pas.
      - name: Type check (bloquant)
        working-directory: ./frontend
        run: npm run type-check

      # Lint non bloquant pour l'instant (5 erreurs préexistantes à corriger).
      # Une fois nettoyé, retirer `continue-on-error` pour en faire un vrai gate.
      - name: Lint (non bloquant)
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      # Hostinger héberge TOUT le site : la landing (servie à la racine via .htaccess)
      # ET l'app React (SPA — routes /login, /subscribe…). `npm run build` (Vite) produit
      # frontend/dist/ = index.html (SPA) + landing.html + .htaccess + assets. Les variables
      # VITE_* (dont VITE_APP_URL=https://start-mybusiness.com) viennent de frontend/.env.production.
      - name: Build app + landing for Hostinger
        working-directory: ./frontend
        run: npm run build

      - name: Deploy full site to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 72.60.93.168
          username: u202854150.start-mybusiness.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          # Hostinger ferme parfois le socket de contrôle → timeout transitoire.
          # 60s (au lieu de 30s par défaut) réduit ces échecs aléatoires.
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
