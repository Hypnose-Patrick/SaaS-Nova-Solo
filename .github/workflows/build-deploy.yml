name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # Gate qualité AVANT le déploiement : `npm run build` = `vite build` seul
      # (esbuild ignore les types), donc sans ce garde-fou une erreur de type
      # partirait en prod. Le type-check est bloquant ; si tsc échoue, l'étape
      # de déploiement FTP ci-dessous ne s'exécute pas.
      - name: Type check (bloquant)
        working-directory: ./frontend
        run: npm run type-check

      # Lint bloquant : 0 erreur dans le code (les warnings ne bloquent pas —
      # pas de --max-warnings). Une erreur ESLint empêche désormais le déploiement.
      - name: Lint (bloquant)
        working-directory: ./frontend
        run: npm run lint

      # Hostinger héberge TOUT le site : la landing (servie à la racine via .htaccess)
      # ET l'app React (SPA — routes /login, /subscribe…). `npm run build` (Vite) produit
      # frontend/dist/ = index.html (SPA) + landing.html + .htaccess + assets. Les variables
      # VITE_* (dont VITE_APP_URL=https://start-mybusiness.com) viennent de frontend/.env.production.
      - name: Build app + landing for Hostinger
        working-directory: ./frontend
        run: npm run build

      # 1re tentative — non bloquante : si l'upload FTP flanche (Hostinger ferme
      # parfois le socket), le job ne meurt pas ici, le retry ci-dessous prend le relais.
      - name: Deploy full site to Hostinger (FTP)
        id: deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 72.60.93.168
          username: u202854150.start-mybusiness.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          # 60s (au lieu de 30s par défaut) réduit les échecs aléatoires.
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**

      # Retry auto UNIQUEMENT si le 1er upload a réellement tourné puis échoué
      # (si le gate/build a planté, `deploy` est "skipped" → pas de retry).
      # Ce step est bloquant : s'il échoue aussi, le déploiement est en échec.
      - name: Deploy retry (Hostinger FTP flaky)
        if: steps.deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 72.60.93.168
          username: u202854150.start-mybusiness.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
