# Configuration Supabase — Nova Solo
project_id = "lkulymxkcfiugjdawjnc"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "https://app.nova-solo.ch"]
jwt_expiry = 3600
enable_signup = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "https://lkulymxkcfiugjdawjnc.supabase.co/auth/v1/callback"

# --- Edge Functions ---
# verify_jwt = true : la passerelle rejette toute requête sans Bearer valide
# (défense en profondeur, en plus du requireUser() interne).

[functions.ai-proxy]
verify_jwt = true

[functions.telegram-send]
verify_jwt = true

[functions.ocr-receipt]
verify_jwt = true
