*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script>
(function() {

  /* ── Utilitaires ── */
  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* Rend le logo : image si URL fournie, sinon nom de marque stylisé */
  function renderLogo(el, imgMaxH, textPx) {
    if (!el) return;
    var url = D.LOGO_URL;
    if (url && url.trim() && url !== '{{LOGO_URL}}') {
      el.innerHTML = '<img src="' + esc(url) + '" alt="' + esc(D.BRAND_NAME) + '" style="max-height:' + imgMaxH + 'px;max-width:180px;object-fit:contain;">';
    } else {
      el.innerHTML = '<span class="cover-brand-text" style="font-size:' + textPx + 'px;">' + esc(D.BRAND_NAME) + '</span>';
    }
  }

  /* ── Parsing Markdown-like → HTML ── */
  function parseContent(raw) {
    function inlineBold(s) {
      return s
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/_(.+?)_/g, '<em>$1</em>');
    }

    var lines = raw.split('\n');
    var html = '';
    var paraLines = [];
    var inList = false;

    function flushPara() {
      if (paraLines.length) {
        html += '<p>' + paraLines.map(inlineBold).join('<br>') + '</p>';
        paraLines = [];
      }
    }
    function flushList() {
      if (inList) { html += '</ul>'; inList = false; }
    }

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].replace(/\r$/, '').trimEnd();

      if (line.startsWith('### ')) {
        flushPara(); flushList();
        html += '<h3>' + inlineBold(line.slice(4)) + '</h3>';
      } else if (line.startsWith('## ')) {
        flushPara(); flushList();
        html += '<h2>' + inlineBold(line.slice(3)) + '</h2>';
      } else if (line.startsWith('# ')) {
        flushPara(); flushList();
        html += '<h1>' + inlineBold(line.slice(2)) + '</h1>';
      } else if (line.startsWith('> ')) {
        flushPara(); flushList();
        html += '<blockquote>' + inlineBold(line.slice(2)) + '</blockquote>';
      } else if (line.startsWith('---') || line.startsWith('***')) {
        flushPara(); flushList();
        html += '<hr>';
      } else if (/^[-*•] /.test(line)) {
        flushPara();
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + inlineBold(line.slice(2)) + '</li>';
      } else if (/^\d+\. /.test(line)) {
        /* Listes numérotées → traitées comme puces */
        flushPara();
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + inlineBold(line.replace(/^\d+\. /, '')) + '</li>';
      } else if (line.trim() === '') {
        flushPara(); flushList();
      } else {
        flushList();
        paraLines.push(line);
      }
    }

    flushPara(); flushList();
    return html;
  }

  /* ── Initialisation principale ── */
  function init() {
    /* Couleur d'accent */
    var accent = D.ACCENT_COLOR;
    if (accent && accent !== '{{ACCENT_COLOR}}') {
      document.documentElement.style.setProperty('--accent', accent);
    }

    /* Date lisible */
    var now = new Date();
    var dateStr = now.toLocaleDateString('fr-CH', {
      day: 'numeric', month: 'long', year: 'numeric'
    });

    /* Titre de l'onglet */
    var tpl = D.TEMPLATE_LABEL !== '{{TEMPLATE_LABEL}}' ? D.TEMPLATE_LABEL : 'Dossier';
    var brand = D.BRAND_NAME !== '{{BRAND_NAME}}' ? D.BRAND_NAME : '';
    document.getElementById('doc-title').textContent = brand ? tpl + ' — ' + brand : tpl;

    /* ── Couverture ── */
    renderLogo(document.getElementById('cover-logo-zone'), 52, 22);

    var dateEl = document.getElementById('cover-date-str');
    if (dateEl) dateEl.innerHTML = esc(dateStr);

    var eyebrow = document.getElementById('cover-eyebrow');
    if (eyebrow) eyebrow.textContent = D.TEMPLATE_LABEL !== '{{TEMPLATE_LABEL}}' ? D.TEMPLATE_LABEL : '';

    var ctitle = document.getElementById('cover-title');
    if (ctitle) ctitle.textContent = D.BRAND_NAME !== '{{BRAND_NAME}}' ? D.BRAND_NAME : '';

    var attnName = document.getElementById('cover-attn-name');
    if (attnName) attnName.textContent = D.RECIP_NOM !== '{{RECIP_NOM}}' ? D.RECIP_NOM : '';

    var attnSub = document.getElementById('cover-attn-sub');
    if (attnSub) {
      var parts = [D.RECIP_FONCTION, D.RECIP_ORG].filter(function(v) {
        return v && v.indexOf('{{') === -1;
      });
      attnSub.textContent = parts.join(' · ');
    }

    /* Contact footer */
    var contactEl = document.getElementById('cover-contact');
    if (contactEl) {
      var lines = [];
      function addLine(v) {
        if (v && v.indexOf('{{') === -1) lines.push(esc(v));
      }
      addLine(D.NAME);
      var emailVal = D.EMAIL !== '{{EMAIL}}' ? D.EMAIL : '';
      var telVal   = D.TEL   !== '{{TEL}}'   ? D.TEL   : '';
      if (emailVal) lines.push('<a href="mailto:' + esc(emailVal) + '">' + esc(emailVal) + '</a>');
      if (telVal)   lines.push(esc(telVal));
      var webVal = D.WEBSITE !== '{{WEBSITE}}' ? D.WEBSITE : '';
      if (webVal) lines.push('<a href="https://' + esc(webVal) + '" target="_blank">' + esc(webVal) + '</a>');
      contactEl.innerHTML = lines.join('<br>');
    }

    var cityEl = document.getElementById('cover-city');
    if (cityEl) cityEl.textContent = D.VILLE !== '{{VILLE}}' ? D.VILLE : '';

    /* ── Header pages intérieures ── */
    renderLogo(document.getElementById('ph-logo'), 22, 13);
    var phBrand = document.getElementById('ph-brand');
    if (phBrand) phBrand.textContent = D.BRAND_NAME !== '{{BRAND_NAME}}' ? D.BRAND_NAME : '';
    var phLabel = document.getElementById('ph-label');
    if (phLabel) phLabel.textContent = D.TEMPLATE_LABEL !== '{{TEMPLATE_LABEL}}' ? D.TEMPLATE_LABEL : '';

    /* ── Header récurrent (print) ── */
    renderLogo(document.getElementById('rh-logo'), 18, 11);
    var rhBrand = document.getElementById('rh-brand');
    if (rhBrand) rhBrand.textContent = D.BRAND_NAME !== '{{BRAND_NAME}}' ? D.BRAND_NAME : '';
    var rhLabel = document.getElementById('rh-label');
    if (rhLabel) rhLabel.textContent = D.TEMPLATE_LABEL !== '{{TEMPLATE_LABEL}}' ? D.TEMPLATE_LABEL : '';

    /* ── Contenu ── */
    var contentEl = document.getElementById('content-area');
    if (contentEl && !contentEl.innerHTML.trim()) {
      var raw = D.CONTENT;
      contentEl.innerHTML = (raw && raw !== '{{CONTENT}}')
        ? parseContent(raw)
        : '<p style="color:#8a8aa0;font-style:italic;">Le contenu du dossier sera inséré ici.</p>';
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

</body>
</html>
